<!DOCTYPE html>  
<html lang="fr">  
<head>  
    <meta charset="UTF-8">  
    <meta name="viewport" content="width=device-width, initial-scale=1.0">  
    <title>Chatbot F.J.E.R.E ONGD-ASBL</title>  
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">  
    <style>  
        /* --- CONFIGURATION DES THÈMES VIA VARIABLES CSS --- */
        :root {  
            --primary: #0d6938;       
            --primary-dark: #074623;  
            --accent: #7bc143;        
            --accent-gold: #cca43b;   
            --bg-light: #f9fbf9;      
            --surface: #ffffff;  
            --text-main: #111827;     
            --text-muted: #4b5563;  
            --border: #e5e7eb;  
            --nav-bg: rgba(255, 255, 255, 0.98);
            --input-bg: #ffffff;
            --input-area-bg: #fafbfa;
        }  

        /* Thème Sombre */
        [data-theme="dark"] {
            --primary: #10b981;       
            --primary-dark: #047857;  
            --accent: #34d399;        
            --accent-gold: #fbbf24;   
            --bg-light: #111827;      
            --surface: #1f2937;  
            --text-main: #f9fafb;     
            --text-muted: #9ca3af;  
            --border: #374151;  
            --nav-bg: rgba(17, 24, 39, 0.98);
            --input-bg: #1f2937;
            --input-area-bg: #111827;
        }

        /* Thème Clair Épuré */
        [data-theme="light"] {
            --primary: #2563eb;       
            --primary-dark: #1d4ed8;  
            --accent: #60a5fa;        
            --accent-gold: #d97706;   
            --bg-light: #f9fafb;      
            --surface: #ffffff;  
            --text-main: #1f2937;     
            --text-muted: #4b5563;  
            --border: #e5e7eb;  
            --nav-bg: rgba(255, 255, 255, 0.98);
            --input-bg: #ffffff;
            --input-area-bg: #f9fafb;
        }

        /* Thème Bleu Océan */
        [data-theme="ocean"] {
            --primary: #0284c7;       
            --primary-dark: #0369a1;  
            --accent: #38bdf8;        
            --accent-gold: #f59e0b;   
            --bg-light: #f0f9ff;      
            --surface: #ffffff;  
            --text-main: #0c4a6e;     
            --text-muted: #334155;  
            --border: #e0f2fe;  
            --nav-bg: rgba(240, 249, 255, 0.98);
            --input-bg: #ffffff;
            --input-area-bg: #f0f9ff;
        }

        /* Thème Orange Énergie */
        [data-theme="orange"] {
            --primary: #ea580c;       
            --primary-dark: #c2410c;  
            --accent: #f97316;        
            --accent-gold: #b45309;   
            --bg-light: #fff7ed;      
            --surface: #ffffff;  
            --text-main: #431407;     
            --text-muted: #7c2d12;  
            --border: #ffedd5;  
            --nav-bg: rgba(255, 247, 237, 0.98);
            --input-bg: #ffffff;
            --input-area-bg: #fff7ed;
        }

        /* Thème Rose & Violet Glamour */
        [data-theme="purple"] {
            --primary: #7c3aed;       
            --primary-dark: #6d28d9;  
            --accent: #a78bfa;        
            --accent-gold: #db2777;   
            --bg-light: #faf5ff;      
            --surface: #ffffff;  
            --text-main: #3b0764;     
            --text-muted: #581c87;  
            --border: #f3e8ff;  
            --nav-bg: rgba(250, 245, 255, 0.98);
            --input-bg: #ffffff;
            --input-area-bg: #faf5ff;
        }

        /* Thème Vert Forêt */
        [data-theme="forest"] {
            --primary: #15803d;       
            --primary-dark: #14532d;  
            --accent: #4ade80;        
            --accent-gold: #eab308;   
            --bg-light: #f0fdf4;      
            --surface: #ffffff;  
            --text-main: #14532d;     
            --text-muted: #166534;  
            --border: #dcfce7;  
            --nav-bg: rgba(240, 253, 244, 0.98);
            --input-bg: #ffffff;
            --input-area-bg: #f0fdf4;
        }

        * { 
            box-sizing: border-box; 
            margin: 0; 
            padding: 0; 
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            transition: background-color 0.3s ease, color 0.3s ease, border-color 0.3s ease;
        }  

        body { 
            background-color: var(--bg-light); 
            color: var(--text-main);
            display: flex; 
            flex-direction: column;
            align-items: center; 
            height: 100vh; 
            overflow: hidden; 
        }  

        /* --- BARRE DE NAVIGATION --- */  
        .navbar {  
            position: fixed;  
            top: 0; left: 0; width: 100%;  
            background: var(--nav-bg);  
            backdrop-filter: blur(10px);  
            border-bottom: 1px solid var(--border);  
            display: flex;  
            justify-content: space-between;  
            align-items: center;  
            padding: 16px 8%;  
            z-index: 1000;  
            box-shadow: 0 4px 30px rgba(0, 0, 0, 0.02);  
        }  

        .nav-logo { display: flex; align-items: center; gap: 14px; }  
        
        .logo-container { 
            height: 52px; 
            width: 52px; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            border-radius: 50%; 
            overflow: hidden; 
            background-color: #ffffff !important; 
            box-shadow: 0 2px 8px rgba(0,0,0,0.15); 
            border: 2px solid var(--primary);
        }  
        .logo-container img { height: 100%; width: 100%; object-fit: cover; }  
        .logo-fallback { color: var(--accent-gold); font-size: 26px; display: flex; align-items: center; justify-content: center; }  
        
        .nav-title { display: flex; flex-direction: column; justify-content: center; }  
        .nav-title h1 { font-size: 19px; color: var(--primary-dark); font-weight: 800; line-height: 1.1; letter-spacing: -0.3px; }  
        .nav-title span { font-size: 10.5px; color: var(--primary); display: block; letter-spacing: 1.8px; font-weight: 700; margin-top: 2px; }  
        
        .nav-right-container {
            position: relative;
            display: flex;
            align-items: center;
            gap: 20px;
        }

        /* --- BOUTON MENU DE BARRES UNIQUE --- */
        .menu-toggle-btn {
            background: none;
            border: 1px solid var(--border);
            color: var(--text-main);
            padding: 11px 14px;
            font-size: 1.2rem;
            border-radius: 50%;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            background-color: var(--surface);
            box-shadow: 0 2px 5px rgba(0,0,0,0.05);
        }

        .menu-toggle-btn:hover {
            color: var(--primary);
            border-color: var(--primary);
        }

        /* --- MENU DEROULANT GLOBAL --- */
        .main-dropdown {
            display: none;
            position: absolute;
            right: 0;
            top: 55px;
            background-color: var(--surface);
            min-width: 240px;
            box-shadow: 0px 10px 30px rgba(0,0,0,0.15);
            border: 1px solid var(--border);
            border-radius: 14px;
            z-index: 1100;
            overflow: hidden;
            padding: 8px 0;
        }

        .main-dropdown.show { display: block; }

        .main-dropdown a, .main-dropdown .theme-trigger {
            color: var(--text-main);
            padding: 11px 18px;
            text-decoration: none;
            display: flex;
            align-items: center;
            gap: 12px;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
        }

        .main-dropdown a:hover, .main-dropdown .theme-trigger:hover {
            background-color: var(--border);
            color: var(--primary);
        }

        .dropdown-divider {
            height: 1px;
            background-color: var(--border);
            margin: 6px 0;
        }

        /* --- SOUS-MENU POUR LES THÈMES --- */
        .themes-submenu {
            display: none;
            background-color: var(--bg-light);
            padding: 4px 0;
            border-top: 1px solid var(--border);
            border-bottom: 1px solid var(--border);
        }

        .themes-submenu.show { display: block; }

        .themes-submenu button {
            color: var(--text-main);
            padding: 9px 16px 9px 38px;
            border: none;
            background: none;
            width: 100%;
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 0.88rem;
            font-weight: 600;
            cursor: pointer;
            text-align: left;
        }

        .themes-submenu button:hover {
            background-color: var(--border);
            color: var(--primary);
        }

        /* --- CONTENEUR DE CHAT --- */  
        .chat-container { 
            width: 95%; 
            max-width: 700px; 
            height: 72vh; 
            margin-top: 110px; 
            background: var(--surface); 
            border-radius: 16px; 
            box-shadow: 0 10px 30px rgba(7, 70, 35, 0.05); 
            display: flex; 
            flex-direction: column; 
            overflow: hidden; 
            border: 1px solid var(--border);
        }  

        .chat-box { 
            flex: 1; 
            padding: 25px; 
            overflow-y: auto; 
            display: flex; 
            flex-direction: column; 
            gap: 20px; 
            
            background-image: linear-gradient(rgba(255, 255, 255, 0.94), rgba(255, 255, 255, 0.94)), url('logo.jpg');
            background-position: center;
            background-repeat: no-repeat;
            background-size: 45%; 
        }  

        [data-theme="dark"] .chat-box {
            background-image: linear-gradient(rgba(31, 41, 55, 0.95), rgba(31, 41, 55, 0.95)), url('logo.jpg');
        }

        .message {  
            max-width: 90%;  
            font-size: 1rem;  
            line-height: 1.6;  
            word-wrap: break-word;
            padding: 5px 0;
            z-index: 2; 
        }  

        .user {  
            color: var(--primary);  
            align-self: flex-end;  
            text-align: right;
            font-weight: 600;
        }  

        .user::before {
            content: "Vous : ";
            color: var(--text-muted);
            font-size: 0.85rem;
            display: block;
            margin-bottom: 2px;
            font-weight: normal;
        }

        .ai {  
            color: var(--text-main);  
            align-self: flex-start;  
        }  

        .ai::before {
            content: "F.J.E.R.E : ";
            color: var(--accent-gold);
            font-size: 0.85rem;
            display: block;
            margin-bottom: 2px;
            font-weight: 700;
        }

        /* --- ZONE DE SAISIE --- */  
        .chat-input-area {  
            display: flex;  
            padding: 15px 20px;  
            background: var(--input-area-bg);  
            gap: 12px;  
            border-top: 1px solid var(--border);  
            align-items: center;
            flex-shrink: 0; 
            z-index: 10;
        }  

        input {  
            flex: 1;  
            padding: 12px 20px;  
            border: 1px solid var(--border);  
            border-radius: 30px;  
            outline: none;  
            font-size: 1rem;  
            background: var(--input-bg); 
            color: var(--text-main);
            transition: all 0.2s ease; 
        }  
        input:focus { 
            border-color: var(--primary); 
            box-shadow: 0 0 0 3px rgba(13, 105, 56, 0.1); 
        } 

        .btn-send {  
            background: var(--primary);  
            color: white;  
            border: none;  
            height: 44px;
            width: 44px; 
            border-radius: 50%;  
            cursor: pointer;  
            font-size: 1.1rem;
            transition: all 0.2s ease; 
            box-shadow: 0 4px 12px rgba(13, 105, 56, 0.15); 
            flex-shrink: 0; 
            display: inline-flex;
            align-items: center;
            justify-content: center;
            padding-left: 3px;
        }  
        .btn-send:hover { background: var(--primary-dark); }  

        @media (max-width: 950px) {  
            .chat-container { margin-top: 100px; height: 75vh; }
            .chat-box { background-size: 65%; } 
            .main-dropdown { right: 0; width: 250px; }
        }  
    </style>  
</head>  
<body>  

<nav class="navbar">  
    <div class="nav-logo">  
        <div class="logo-container">  
            <img src="logo.jpg" alt="Logo Officiel F.J.E.R.E." onerror="this.style.display='none'; this.nextElementSibling.style.display='flex';">  
            <div class="logo-fallback" style="display:none;"><i class="fas fa-feather-alt"></i></div>  
        </div>  
        <div class="nav-title">  
            <h1>F.J.E.R.E. ONGD</h1>  
            <span>RÉUSSIR ENSEMBLE</span>  
        </div>  
    </div>  
    
    <div class="nav-right-container">
        <!-- Bouton Unique à icône Menu -->
        <button class="menu-toggle-btn" onclick="toggleMainDropdown()" title="Menu">
            <i class="fas fa-bars"></i>
        </button>

        <!-- Menu déroulant global unifié -->
        <div class="main-dropdown" id="mainDropdown">
            <a href="#"><i class="fas fa-home"></i> Accueil</a>
            <a href="#"><i class="fas fa-bullseye"></i> Nos objectifs</a>
            <a href="#"><i class="fas fa-info-circle"></i> À propos de nous</a>
            <a href="#"><i class="fas fa-envelope"></i> Contact</a>
            
            <div class="dropdown-divider"></div>
            
            <!-- Déclencheur interne thèmes -->
            <div class="theme-trigger" onclick="toggleThemesSubmenu(event)">
                <i class="fas fa-palette"></i> Changer le thème <i class="fas fa-chevron-down" style="margin-left: auto; font-size: 0.8rem;"></i>
            </div>
            
            <!-- Sous-menu thèmes -->
            <div class="themes-submenu" id="themesSubmenu">
                <button onclick="setTheme('default')"><i class="fas fa-leaf" style="color: #0d6938;"></i> Vert (Standard)</button>
                <button onclick="setTheme('dark')"><i class="fas fa-moon" style="color: #10b981;"></i> Mode Sombre</button>
                <button onclick="setTheme('light')"><i class="fas fa-sun" style="color: #2563eb;"></i> Mode Clair</button>
                <button onclick="setTheme('ocean')"><i class="fas fa-water" style="color: #0284c7;"></i> Bleu Océan</button>
                <button onclick="setTheme('orange')"><i class="fas fa-fire" style="color: #ea580c;"></i> Orange Énergie</button>
                <button onclick="setTheme('purple')"><i class="fas fa-wand-magic-sparkles" style="color: #7c3aed;"></i> Améthyste</button>
                <button onclick="setTheme('forest')"><i class="fas fa-tree" style="color: #15803d;"></i> Vert Forêt</button>
            </div>
        </div>
    </div>
</nav>  

<div class="chat-container">  
    <div class="chat-box" id="chatBox">  
        <div class="message ai">Bonjour ! Je suis l'assistant officiel de la F.J.E.R.E. Comment puis-je vous aider aujourd'hui ?</div>  
    </div>  
    <div class="chat-input-area">  
        <input type="text" id="userInput" placeholder="Posez votre question..." onkeypress="handleKeyPress(event)">  
        <button class="btn-send" onclick="sendMessage()"><i class="fas fa-paper-plane"></i></button>  
    </div>  
</div>  

<script>  
    const GROQ_API_KEY = "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";   
  
    const CONNAISSANCES_FJERE = `  
    Tu es l'assistante virtuelle officielle de l'ONGD-ASBL "Force des Jeunes Entrepreneurs Réussir Ensemble" (F.J.E.R.E). Tu t'exprimes avec fluidité, empathie, de manière naturelle et intelligente comme une vraie humaine. Évite les phrases trop robotiques ou répétitives.
    
    VOS CONNAISSANCES :
    - Adresse : Av Chemin Publique, N°3345 Q/Gambella II, C/Lubumbashi, Haut-Katanga, RDC.  
    - Contacts FJE : +243 97 89 10 379 / 810 746 421 | forcedesjeunesentrepreneurs@gmail.com.  
    - Création : Fondée le 2 août 2018 à Lubumbashi, début des actions le 19 décembre 2021.  
    - Objectif : Promouvoir la jeunesse congolaise via l'entrepreneuriat, l'accompagnement des leaders porteurs d'idées et le développement durable.  
    - Domaines : Agriculture, élevage, environnement, droits humains, formation professionnelle, santé, lutte contre le travail des jeunes dans les mines.  
    - Adhésion : Remplir une fiche visée par le PCA, engagement volontaire et cotisation mensuelle.  
    
    VOTRE CRÉATEUR / CONCEPTEUR :
    - Nom : MUSIWA PATAULE ESPOIR. Développeur web chevronné, étudiant en BAC1 IAGE à l'Université Protestante de Lubumbashi (UPL), né le 05/06/2006. Contacts : 0978713440 / 0859424814.
    - Demande de Photos : Indique avec le sourire qu'il faut le contacter directement sur son WhatsApp au +243978713440.

    RÈGLES DE CONVERSATION ET RESTRICTIONS DE SUJET :
    Tu dois être agréable. Si l'utilisateur te salue ou te demande comment tu vas, réponds-y poliment et naturellement.
    Cependant, tu es l'assistante exclusive de la F.J.E.R.E. Si l'utilisateur tente de t'amener sur des sujets totalement hors-sujet (recettes de cuisine, devoirs scolaires généraux, actualités mondiales, sport, code informatique sans rapport, etc.), tu dois refuser de répondre au sujet mais le faire avec tact et humanité.
    
    Pour indiquer un hors-sujet, commence obligatoirement ta phrase par le code secret : [HORS_CADRE] puis formule une réponse humaine et polie pour rediriger l'utilisateur vers la F.J.E.R.E ou Espoir. 
    Exemple de refus humain : "[HORS_CADRE] C'est une question intéressante, mais en tant qu'assistante de la F.J.E.R.E, je dois me concentrer sur nos projets d'entrepreneuriat et nos actions à Lubumbashi. Revenons à nos activités si vous le voulez bien !"
    `;  
  
    let historiqueMessages = [
        { role: "system", content: CONNAISSANCES_FJERE }
    ];

    async function sendMessage() {  
        const input = document.getElementById('userInput');  
        const chatBox = document.getElementById('chatBox');  
        const text = input.value.trim();  
          
        if (!text) return;  
  
        chatBox.innerHTML += `<div class="message user">${text}</div>`;  
        input.value = '';  
        chatBox.scrollTop = chatBox.scrollHeight;  
  
        historiqueMessages.push({ role: "user", content: text });

        try {  
            const response = await fetch('https://api.groq.com/openai/v1/chat/completions', {  
                method: 'POST',  
                headers: {  
                    'Content-Type': 'application/json',  
                    'Authorization': `Bearer ${GROQ_API_KEY}`  
                },  
                body: JSON.stringify({  
                    model: "llama-3.3-70b-versatile",  
                    messages: historiqueMessages,
                    temperature: 0.5 
                })  
            });  
  
            const data = await response.json();  
              
            if (data.choices && data.choices[0]) {  
                let reply = data.choices[0].message.content.trim();  
                
                if (reply.includes("[HORS_CADRE]")) {
                    reply = reply.replace("[HORS_CADRE]", "").trim();
                }
                
                historiqueMessages.push({ role: "assistant", content: reply });
                chatBox.innerHTML += `<div class="message ai">${reply}</div>`;  
            } else if (data.error) {  
                chatBox.innerHTML += `<div class="message ai" style="color:red;">Erreur : ${data.error.message}</div>`;  
            }  
        } catch (error) {  
            chatBox.innerHTML += `<div class="message ai" style="color:red;">Erreur de connexion ou technique.</div>`;  
        }  
  
        chatBox.scrollTop = chatBox.scrollHeight;  
    }  
  
    function handleKeyPress(event) {  
        if (event.key === 'Enter') {  
            sendMessage();  
        }  
    }  

    /* --- LOGIQUE DES MENUS ET DÉROULANTS --- */
    function toggleMainDropdown() {
        document.getElementById('mainDropdown').classList.toggle('show');
    }

    function toggleThemesSubmenu(event) {
        event.stopPropagation(); // Évite la fermeture instantanée du conteneur parent
        document.getElementById('themesSubmenu').classList.toggle('show');
    }

    function setTheme(themeName) {
        if (themeName === 'default') {
            document.documentElement.removeAttribute('data-theme');
        } else {
            document.documentElement.setAttribute('data-theme', themeName);
        }
        // Ferme proprement les structures après clic
        document.getElementById('mainDropdown').classList.remove('show');
        document.getElementById('themesSubmenu').classList.remove('show');
    }

    // Gestionnaire global pour masquer le menu lors d'un clic en dehors
    window.onclick = function(event) {
        if (!event.target.matches('.menu-toggle-btn') && !event.target.matches('.menu-toggle-btn i') && !event.target.closest('.main-dropdown')) {
            document.getElementById('mainDropdown').classList.remove('show');
            document.getElementById('themesSubmenu').classList.remove('show');
        }
    }
</script>

</body>  
</html>
