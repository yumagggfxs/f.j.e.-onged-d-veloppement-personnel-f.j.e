<!DOCTYPE html>  
<html lang="fr">  
<head>  
    <meta charset="UTF-8">  
    <meta name="viewport" content="width=device-width, initial-scale=1.0">  
    <title>Chatbot F.J.E.R.E ONGD-ASBL</title>  
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">  
    <style>  
        :root {  
            --primary: #0d6938;       
            --primary-dark: #074623;  
            --accent: #7bc143;        
            --accent-gold: #cca43b;   
            --bg-light: #f9fbf9;      
            --surface: #ffffff;  
            --text-main: #111827;     
            --text-muted: #4b5563;  
            --border: #e5e7eb;  
        }  

        * { 
            box-sizing: border-box; 
            margin: 0; 
            padding: 0; 
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
        }  

        body { 
            background-color: var(--bg-light); 
            color: var(--text-main);
            display: flex; 
            flex-direction: column;
            align-items: center; 
            height: 100vh; 
            overflow: hidden; 
        }  

        /* --- BARRE DE NAVIGATION --- */  
        .navbar {  
            position: fixed;  
            top: 0; left: 0; width: 100%;  
            background: rgba(255, 255, 255, 0.98);  
            backdrop-filter: blur(10px);  
            border-bottom: 1px solid var(--border);  
            display: flex;  
            justify-content: space-between;  
            align-items: center;  
            padding: 16px 8%;  
            z-index: 1000;  
            box-shadow: 0 4px 30px rgba(0, 0, 0, 0.02);  
        }  

        .nav-logo { display: flex; align-items: center; gap: 14px; }  
        .logo-container { height: 50px; display: flex; align-items: center; justify-content: center; }  
        .logo-container img { height: 100%; width: auto; object-fit: contain; }  
        .logo-fallback { color: var(--accent-gold); font-size: 26px; display: flex; align-items: center; justify-content: center; }  
        .nav-title { display: flex; flex-direction: column; justify-content: center; }  
        .nav-title h1 { font-size: 19px; color: var(--primary-dark); font-weight: 800; line-height: 1.1; letter-spacing: -0.3px; }  
        .nav-title span { font-size: 10.5px; color: var(--primary); display: block; letter-spacing: 1.8px; font-weight: 700; margin-top: 2px; }  
        .nav-menu { display: flex; list-style: none; gap: 35px; align-items: center; }  
        .nav-menu a { text-decoration: none; color: var(--text-main); font-weight: 600; font-size: 15px; transition: color 0.2s ease; }  
        .nav-menu a:hover { color: var(--primary); }  
        .btn-nav-join { background: var(--primary); color: white !important; padding: 11px 26px; border-radius: 30px; transition: all 0.2s ease; box-shadow: 0 4px 12px rgba(13, 105, 56, 0.15); }  
        .btn-nav-join:hover { background: var(--primary-dark); transform: translateY(-1px); }  

        /* --- CONTENEUR DE CHAT --- */  
        .chat-container { 
            width: 95%; 
            max-width: 700px; 
            height: 72vh; 
            margin-top: 110px; 
            background: var(--surface); 
            border-radius: 16px; 
            box-shadow: 0 10px 30px rgba(7, 70, 35, 0.05); 
            display: flex; 
            flex-direction: column; 
            overflow: hidden; 
            border: 1px solid var(--border);
        }  

        .chat-box { 
            flex: 1; 
            padding: 25px; 
            overflow-y: auto; 
            display: flex; 
            flex-direction: column; 
            gap: 20px; 
            
            background-image: linear-gradient(rgba(255, 255, 255, 0.92), rgba(255, 255, 255, 0.92)), url('logo.jpg');
            background-position: center;
            background-repeat: no-repeat;
            background-size: 45%; 
        }  

        .message {  
            max-width: 90%;  
            font-size: 1rem;  
            line-height: 1.6;  
            word-wrap: break-word;
            padding: 5px 0;
            z-index: 2; 
        }  

        .user {  
            color: var(--primary);  
            align-self: flex-end;  
            text-align: right;
            font-weight: 600;
        }  

        .user::before {
            content: "Vous : ";
            color: var(--text-muted);
            font-size: 0.85rem;
            display: block;
            margin-bottom: 2px;
            font-weight: normal;
        }

        .ai {  
            color: var(--text-main);  
            align-self: flex-start;  
        }  

        .ai::before {
            content: "F.J.E.R.E : ";
            color: var(--accent-gold);
            font-size: 0.85rem;
            display: block;
            margin-bottom: 2px;
            font-weight: 700;
        }

        /* --- ZONE DE SAISIE --- */  
        .chat-input-area {  
            display: flex;  
            padding: 15px 20px;  
            background: #fafbfa;  
            gap: 12px;  
            border-top: 1px solid var(--border); 
            align-items: center;
            flex-shrink: 0; 
            z-index: 10;
        }  

        input {  
            flex: 1;  
            padding: 12px 20px;  
            border: 1px solid var(--border);  
            border-radius: 30px;  
            outline: none;  
            font-size: 1rem;  
            background: white; 
            transition: all 0.2s ease; 
        }  
        input:focus { 
            border-color: var(--primary); 
            box-shadow: 0 0 0 3px rgba(13, 105, 56, 0.1); 
        } 

        .btn-send {  
            background: var(--primary);  
            color: white;  
            border: none;  
            height: 44px;
            width: 44px; 
            border-radius: 50%;  
            cursor: pointer;  
            font-size: 1.1rem;
            transition: all 0.2s ease; 
            box-shadow: 0 4px 12px rgba(13, 105, 56, 0.15); 
            flex-shrink: 0; 
            display: inline-flex;
            align-items: center;
            justify-content: center;
            padding-left: 3px;
        }  
        .btn-send:hover { background: var(--primary-dark); }  

        @media (max-width: 950px) {  
            .nav-menu { display: none; }  
            .chat-container { margin-top: 100px; height: 75vh; }
            .chat-box { background-size: 65%; } 
        }  
    </style>  
</head>  
<body>  

<nav class="navbar">  
    <div class="nav-logo">  
        <div class="logo-container">  
            <img src="logo.jpg" alt="Logo Officiel F.J.E.R.E." onerror="this.style.display='none'; this.nextElementSibling.style.display='flex';">  
            <div class="logo-fallback" style="display:none;"><i class="fas fa-feather-alt"></i></div>  
        </div>  
        <div class="nav-title">  
            <h1>F.J.E.R.E. ONGD</h1>  
            <span>RÉUSSIR ENSEMBLE</span>  
        </div>  
    </div>  
    <ul class="nav-menu">  
        <li><a href="#">Accueil</a></li>  
        <li><a href="javascript:void(0)" class="btn-nav-join">S'inscrire</a></li>  
    </ul>  
</nav>  

<div class="chat-container">  
    <div class="chat-box" id="chatBox">  
        <div class="message ai">Bonjour ! Je suis l'assistant officiel de la F.J.E.R.E. Comment puis-je vous aider aujourd'hui ?</div>  
    </div>  
    <div class="chat-input-area">  
        <input type="text" id="userInput" placeholder="Posez votre question..." onkeypress="handleKeyPress(event)">  
        <button class="btn-send" onclick="sendMessage()"><i class="fas fa-paper-plane"></i></button>  
    </div>  
</div>  

<script>  
    const GROQ_API_KEY = "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";   
  
    const CONNAISSANCES_FJERE = `  
    Tu es l'assistante virtuelle officielle de l'ONGD-ASBL "Force des Jeunes Entrepreneurs Réussir Ensemble" (F.J.E.R.E). Tu t'exprimes avec fluidité, empathie, de manière naturelle et intelligente comme une vraie humaine. Évite les phrases trop robotiques ou répétitives.
    
    VOS CONNAISSANCES :
    - Adresse : Av Chemin Publique, N°3345 Q/Gambella II, C/Lubumbashi, Haut-Katanga, RDC.  
    - Contacts FJE : +243 97 89 10 379 / 810 746 421 | forcedesjeunesentrepreneurs@gmail.com.  
    - Création : Fondée le 2 août 2018 à Lubumbashi, début des actions le 19 décembre 2021.  
    - Objectif : Promouvoir la jeunesse congolaise via l'entrepreneuriat, l'accompagnement des leaders porteurs d'idées et le développement durable.  
    - Domaines : Agriculture, élevage, environnement, droits humains, formation professionnelle, santé, lutte contre le travail des jeunes dans les mines.  
    - Adhésion : Remplir une fiche visée par le PCA, engagement volontaire et cotisation mensuelle.  
    
    VOTRE CRÉATEUR / CONCEPTEUR :
    - Nom : MUSIWA PATAULE ESPOIR. Développeur web chevronné, étudiant en BAC1 IAGE à l'Université Protestante de Lubumbashi (UPL), né le 05/06/2006. Contacts : 0978713440 / 0859424814.
    - Demande de Photos : Indique avec le sourire qu'il faut le contacter directement sur son WhatsApp au +243978713440.

    RÈGLES DE CONVERSATION ET RESTRICTIONS DE SUJET :
    Tu dois être agréable. Si l'utilisateur te salue ou te demande comment tu vas, réponds-y poliment et naturellement.
    Cependant, tu es l'assistante exclusive de la F.J.E.R.E. Si l'utilisateur tente de t'amener sur des sujets totalement hors-sujet (recettes de cuisine, devoirs scolaires généraux, actualités mondiales, sport, code informatique sans rapport, etc.), tu dois refuser de répondre au sujet mais le faire avec tact et humanité.
    
    Pour indiquer un hors-sujet, commence obligatoirement ta phrase par le code secret : [HORS_CADRE] puis formule une réponse humaine et polie pour rediriger l'utilisateur vers la F.J.E.R.E ou Espoir. 
    Exemple de refus humain : "[HORS_CADRE] C'est une question intéressante, mais en tant qu'assistante de la F.J.E.R.E, je dois me concentrer sur nos projets d'entrepreneuriat et nos actions à Lubumbashi. Revenons à nos activités si vous le voulez bien !"
    `;  
  
    let historiqueMessages = [
        { role: "system", content: CONNAISSANCES_FJERE }
    ];

    async function sendMessage() {  
        const input = document.getElementById('userInput');  
        const chatBox = document.getElementById('chatBox');  
        const text = input.value.trim();  
          
        if (!text) return;  
  
        chatBox.innerHTML += `<div class="message user">${text}</div>`;  
        input.value = '';  
        chatBox.scrollTop = chatBox.scrollHeight;  
  
        historiqueMessages.push({ role: "user", content: text });

        try {  
            const response = await fetch('https://api.groq.com/openai/v1/chat/completions', {  
                method: 'POST',  
                headers: {  
                    'Content-Type': 'application/json',  
                    'Authorization': `Bearer ${GROQ_API_KEY}`  
                },  
                body: JSON.stringify({  
                    model: "llama-3.3-70b-versatile",  
                    messages: historiqueMessages,
                    temperature: 0.5 // Température idéale pour allier naturel humain et respect des consignes
                })  
            });  
  
            const data = await response.json();  
              
            if (data.choices && data.choices[0]) {  
                let reply = data.choices[0].message.content.trim();  
                
                // On nettoie le tag secret du script pour que l'utilisateur final ne voie qu'une phrase humaine et fluide
                if (reply.includes("[HORS_CADRE]")) {
                    reply = reply.replace("[HORS_CADRE]", "").trim();
                }
                
                historiqueMessages.push({ role: "assistant", content: reply });
                chatBox.innerHTML += `<div class="message ai">${reply}</div>`;  
            } else if (data.error) {  
                chatBox.innerHTML += `<div class="message ai" style="color:red;">Erreur : ${data.error.message}</div>`;  
            }  
        } catch (error) {  
            chatBox.innerHTML += `<div class="message ai" style="color:red;">Erreur de connexion.</div>`;  
        }  
  
        chatBox.scrollTop = chatBox.scrollHeight;  
    }  
  
    function handleKeyPress(event) {  
        if (event.key === 'Enter') {  
            sendMessage();  
        }  
    }  
</script>  
</body>  
</html>
